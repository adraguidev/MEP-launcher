name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - 'mep_launcher.py'
      - 'mep_launcher.spec'
      - 'scripts/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller mep_launcher.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MEP_Gatherer
          path: dist/MEP_Gatherer.exe
          retention-days: 90
